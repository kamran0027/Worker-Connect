# Application
spring.application.name=WorkerConnect
server.port=8080
server.address=0.0.0.0

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/workerconnect_db
spring.datasource.username=**********
spring.datasource.password=*************
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# File Storage
app.file.upload-dir=./uploads
app.file.profile-images-dir=./uploads/profiles
app.file.documents-dir=./uploads/documents
app.file.invoices-dir=./uploads/invoices


# Email Configuration (configure with your SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=****************
spring.mail.password=*****************
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=******************

# Razorpay
razorpay.key.id=*********************
razorpay.key.secret=************************
razorpay.mode=test


# Session
server.servlet.session.timeout=30m

# Logging
logging.level.com.workerconnect=DEBUG
logging.level.org.springframework.security=INFO

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.type=redis
