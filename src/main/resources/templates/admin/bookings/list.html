<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Bookings | Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link th:href="@{/css/style.css}" rel="stylesheet"/></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid px-4"><a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect Admin</a>
    <div class="ms-auto"><a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Logout</a></div></div>
</nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 p-0 sidebar d-none d-md-block" style="min-height:100vh;">
  <nav class="nav flex-column py-3">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i>Users</a>
    <a class="nav-link" th:href="@{/admin/workers}"><i class="fas fa-hard-hat me-2"></i>Workers</a>
    <a class="nav-link active" th:href="@{/admin/bookings}"><i class="fas fa-calendar-check me-2"></i>Bookings</a>
    <a class="nav-link" th:href="@{/admin/agreements}"><i class="fas fa-file-signature me-2"></i>Agreements</a>
    <a class="nav-link" th:href="@{/admin/payments}"><i class="fas fa-credit-card me-2"></i>Payments</a>
    <a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-tags me-2"></i>Categories</a>
    <a class="nav-link" th:href="@{/admin/reviews}"><i class="fas fa-star me-2"></i>Reviews</a>
    <a class="nav-link text-danger mt-4" th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </nav>
</div>
<div class="col-md-10 p-4">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-calendar-check me-2 text-primary"></i>All Bookings</h4>
    <span class="badge bg-primary fs-6" th:text="${#lists.size(bookings ?: {})} + ' total'"></span>
  </div>
  <div class="mb-3 d-flex gap-2 flex-wrap">
    <a th:href="@{/admin/bookings}" class="btn btn-sm" th:classappend="${status == null} ? 'btn-dark' : 'btn-outline-dark'">All</a>
    <a th:href="@{/admin/bookings(status=PENDING)}" class="btn btn-sm btn-outline-warning">Pending</a>
    <a th:href="@{/admin/bookings(status=ACCEPTED)}" class="btn btn-sm btn-outline-primary">Accepted</a>
    <a th:href="@{/admin/bookings(status=COMPLETED)}" class="btn btn-sm btn-outline-success">Completed</a>
    <a th:href="@{/admin/bookings(status=CANCELLED)}" class="btn btn-sm btn-outline-danger">Cancelled</a>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Booking #</th><th>Customer</th><th>Worker</th><th>Service</th><th>Date</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="b : ${bookings}">
              <td><small class="text-muted" th:text="${b.bookingNumber}"></small></td>
              <td><small class="fw-semibold" th:text="${b.user.fullName}"></small></td>
              <td><small th:text="${b.worker.fullName}"></small></td>
              <td><small th:text="${#strings.abbreviate(b.workDescription,25)}"></small></td>
              <td><small th:text="${b.bookingDate}"></small></td>
              <td class="fw-semibold">₹<span th:text="${b.amount}"></span></td>
              <td><span class="badge"
                        th:classappend="${b.status != null and b.status.name() == 'COMPLETED'} ? 'bg-success' :
                                         (${b.status != null and b.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                         (${b.status != null and b.status.name() == 'ACCEPTED'} ? 'bg-primary' :
                                         (${b.status != null and b.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary')))"
                        th:text="${b.status}"></span></td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/admin/bookings/{id}(id=${b.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a>
                  <form th:if="${b.status != null and b.status.name() != 'CANCELLED' and b.status.name() != 'COMPLETED'}"
                        th:action="@{/admin/bookings/{id}/cancel(id=${b.id})}" method="post" class="m-0" onsubmit="return confirm('Cancel this booking?')">
                    <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-ban"></i></button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${bookings == null or bookings.empty}">
              <td colspan="8" class="text-center text-muted py-4">No bookings found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body></html>
