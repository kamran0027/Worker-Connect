<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Payments | Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link th:href="@{/css/style.css}" rel="stylesheet"/></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid px-4"><a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect Admin</a>
    <div class="ms-auto"><a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Logout</a></div></div>
</nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 p-0 sidebar d-none d-md-block" style="min-height:100vh;">
  <nav class="nav flex-column py-3">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i>Users</a>
    <a class="nav-link" th:href="@{/admin/workers}"><i class="fas fa-hard-hat me-2"></i>Workers</a>
    <a class="nav-link" th:href="@{/admin/bookings}"><i class="fas fa-calendar-check me-2"></i>Bookings</a>
    <a class="nav-link" th:href="@{/admin/agreements}"><i class="fas fa-file-signature me-2"></i>Agreements</a>
    <a class="nav-link active" th:href="@{/admin/payments}"><i class="fas fa-credit-card me-2"></i>Payments</a>
    <a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-tags me-2"></i>Categories</a>
    <a class="nav-link" th:href="@{/admin/reviews}"><i class="fas fa-star me-2"></i>Reviews</a>
    <a class="nav-link text-danger mt-4" th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </nav>
</div>
<div class="col-md-10 p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-credit-card me-2 text-primary"></i>Payment Management</h4>
    <div class="card border-0 bg-success text-white px-4 py-2 rounded-pill">
      <span class="small fw-bold">Total Revenue: ₹<span th:text="${totalRevenue}">0</span></span>
    </div>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>Transaction ID</th><th>Booking #</th><th>Customer</th><th>Worker</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th><th>Invoice</th></tr></thead>
          <tbody>
            <tr th:each="p : ${payments}">
              <td><small class="text-muted" th:text="${p.transactionId != null ? p.transactionId : '-'}"></small></td>
              <td><small th:text="${p.booking.bookingNumber}"></small></td>
              <td><small th:text="${p.booking.user.fullName}"></small></td>
              <td><small th:text="${p.booking.worker.fullName}"></small></td>
              <td class="fw-semibold text-success">₹<span th:text="${p.amount}"></span></td>
              <td><span class="badge bg-secondary" th:text="${p.paymentMethod}"></span></td>
              <td><small th:text="${p.paymentDate != null ? p.paymentDate : '-'}"></small></td>
              <td><span class="payment-badge" th:classappend="${p.status != null and p.status.name() == 'COMPLETED'} ? 'completed' : (${p.status != null and p.status.name() == 'PENDING'} ? 'pending' : 'failed')" th:text="${p.status}"></span></td>
              <td>
                <a th:if="${p.status != null and p.status.name() == 'COMPLETED'}" th:href="@{/admin/payments/{id}/invoice(id=${p.booking.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-download"></i></a>
              </td>
            </tr>
            <tr th:if="${payments == null or payments.empty}">
              <td colspan="9" class="text-center text-muted py-4">No payment records found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body></html>
