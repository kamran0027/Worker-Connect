<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reviews | Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link th:href="@{/css/style.css}" rel="stylesheet"/></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid px-4"><a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect Admin</a>
    <div class="ms-auto"><a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Logout</a></div></div>
</nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 p-0 sidebar d-none d-md-block" style="min-height:100vh;">
  <nav class="nav flex-column py-3">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a class="nav-link" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i>Users</a>
    <a class="nav-link" th:href="@{/admin/workers}"><i class="fas fa-hard-hat me-2"></i>Workers</a>
    <a class="nav-link" th:href="@{/admin/bookings}"><i class="fas fa-calendar-check me-2"></i>Bookings</a>
    <a class="nav-link" th:href="@{/admin/agreements}"><i class="fas fa-file-signature me-2"></i>Agreements</a>
    <a class="nav-link" th:href="@{/admin/payments}"><i class="fas fa-credit-card me-2"></i>Payments</a>
    <a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-tags me-2"></i>Categories</a>
    <a class="nav-link active" th:href="@{/admin/reviews}"><i class="fas fa-star me-2"></i>Reviews</a>
    <a class="nav-link text-danger mt-4" th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </nav>
</div>
<div class="col-md-10 p-4">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-star me-2 text-warning"></i>Review Management</h4>
    <span class="badge bg-primary fs-6" th:text="${#lists.size(reviews ?: {})} + ' reviews'"></span>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>#</th><th>Customer</th><th>Worker</th><th>Rating</th><th>Comment</th><th>Date</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="r,i : ${reviews}">
              <td th:text="${i.index+1}"></td>
              <td><small class="fw-semibold" th:text="${r.user.fullName}"></small></td>
              <td><small th:text="${r.worker.fullName}"></small></td>
              <td>
                <div class="star-rating">
                  <i class="fas fa-star"></i><span th:text="${r.rating}"></span>/5
                </div>
              </td>
              <td><small th:text="${#strings.abbreviate(r.comment,50)}"></small></td>
              <td><small th:text="${#temporals.format(r.createdAt,'dd MMM yyyy')}"></small></td>
              <td>
                <span class="badge" th:classappend="${r.active} ? 'bg-success' : 'bg-secondary'" th:text="${r.active} ? 'Visible' : 'Hidden'"></span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <form th:if="${r.active}" th:action="@{/admin/reviews/{id}/deactivate(id=${r.id})}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm btn-warning" title="Hide Review"><i class="fas fa-eye-slash"></i></button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  </form>
                  <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post" class="m-0" onsubmit="return confirm('Permanently delete this review?')">
                    <button type="submit" class="btn btn-sm btn-danger" title="Delete"><i class="fas fa-trash"></i></button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${reviews == null or reviews.empty}">
              <td colspan="8" class="text-center text-muted py-4">No reviews found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body></html>
