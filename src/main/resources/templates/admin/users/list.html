<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Users | Admin</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<link th:href="@{/css/style.css}" rel="stylesheet"/></head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" th:href="@{/admin/dashboard}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect Admin</a>
    <div class="ms-auto"><a th:href="@{/auth/logout}" class="btn btn-outline-light btn-sm">Logout</a></div>
  </div>
</nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 p-0 sidebar d-none d-md-block" style="min-height:100vh;">
  <nav class="nav flex-column py-3">
    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a class="nav-link active" th:href="@{/admin/users}"><i class="fas fa-users me-2"></i>Users</a>
    <a class="nav-link" th:href="@{/admin/workers}"><i class="fas fa-hard-hat me-2"></i>Workers</a>
    <a class="nav-link" th:href="@{/admin/bookings}"><i class="fas fa-calendar-check me-2"></i>Bookings</a>
    <a class="nav-link" th:href="@{/admin/agreements}"><i class="fas fa-file-signature me-2"></i>Agreements</a>
    <a class="nav-link" th:href="@{/admin/payments}"><i class="fas fa-credit-card me-2"></i>Payments</a>
    <a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-tags me-2"></i>Categories</a>
    <a class="nav-link" th:href="@{/admin/reviews}"><i class="fas fa-star me-2"></i>Reviews</a>
    <a class="nav-link text-danger mt-4" th:href="@{/auth/logout}"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </nav>
</div>
<div class="col-md-10 p-4">
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}"><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0"><i class="fas fa-users me-2 text-primary"></i>User Management</h4>
    <span class="badge bg-primary fs-6" th:text="${#lists.size(users ?: {})} + ' users'"></span>
  </div>
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body p-3">
      <form th:action="@{/admin/users}" method="get" class="d-flex gap-2">
        <input type="text" name="query" class="form-control" placeholder="Search by name or email..." th:value="${query}"/>
        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-search"></i></button>
        <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Clear</a>
      </form>
    </div>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="u,i : ${users}">
              <td th:text="${i.index+1}"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <img th:src="${u.profileImage != null ? u.profileImage : '/images/default-user.png'}" class="rounded-circle" width="32" height="32" style="object-fit:cover" alt=""/>
                  <span class="fw-semibold small" th:text="${u.fullName}"></span>
                </div>
              </td>
              <td><small th:text="${u.email}"></small></td>
              <td><small th:text="${u.phone}"></small></td>
              <td><small th:text="${u.city}"></small></td>
              <td><small th:text="${u.createdAt != null ? #temporals.format(u.createdAt,'dd MMM yyyy') : ''}"></small></td>
              <td>
                <span class="badge" th:classappend="${u.enabled} ? 'bg-success' : 'bg-danger'" th:text="${u.enabled} ? 'Active' : 'Inactive'"></span>
              </td>
              <td>
                <div class="d-flex gap-1">
                  <a th:href="@{/admin/users/{id}(id=${u.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-eye"></i></a>
                  <form th:action="@{/admin/users/{id}/toggle-status(id=${u.id})}" method="post" class="m-0">
                    <button type="submit" class="btn btn-sm" th:classappend="${u.enabled} ? 'btn-warning' : 'btn-success'"
                            th:title="${u.enabled} ? 'Deactivate' : 'Activate'">
                      <i class="fas" th:classappend="${u.enabled} ? 'fa-ban' : 'fa-check'"></i>
                    </button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  </form>
                  <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="m-0" onsubmit="return confirm('Delete this user?')">
                    <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  </form>
                </div>
              </td>
            </tr>
            <tr th:if="${users == null or users.empty}">
              <td colspan="8" class="text-center text-muted py-4">No users found.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body></html>
