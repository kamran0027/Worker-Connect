<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register | WorkerConnect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <a th:href="@{/}" class="text-decoration-none">
                    <h2 class="text-primary fw-bold"><i class="fas fa-hard-hat me-2"></i>WorkerConnect</h2>
                </a>
                <p class="text-muted">Create your customer account</p>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/auth/register}" method="post" th:object="${userDto}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Full Name *</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="John Doe" required/>
                            <span class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email Address *</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="john@example.com" required/>
                            <span class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phone Number *</label>
                            <input type="tel" class="form-control" th:field="*{phone}" placeholder="+91 98765 43210" required/>
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold">City</label>
                                <input type="text" class="form-control" th:field="*{city}" placeholder="Mumbai"/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">State</label>
                                <input type="text" class="form-control" th:field="*{state}" placeholder="Maharashtra"/>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password *</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Min. 6 characters" required/>
                            <span class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Confirm Password *</label>
                            <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Repeat password" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <p class="text-muted small">Already have an account? <a th:href="@{/auth/login}" class="text-primary fw-semibold">Sign In</a></p>
                <p class="text-muted small">Want to offer services? <a th:href="@{/auth/register/worker}" class="text-success fw-semibold">Join as Worker</a></p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
