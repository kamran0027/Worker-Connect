<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register as Worker | WorkerConnect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-4">
                <a th:href="@{/}" class="text-decoration-none">
                    <h2 class="text-primary fw-bold"><i class="fas fa-hard-hat me-2"></i>WorkerConnect</h2>
                </a>
                <p class="text-muted">Register as a Service Provider</p>
            </div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/auth/register/worker}" method="post" th:object="${workerDto}">
                <!-- Personal Info -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-primary text-white fw-bold py-3">
                        <i class="fas fa-user me-2"></i>Personal Information
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name *</label>
                                <input type="text" class="form-control" th:field="*{fullName}" required/>
                                <span class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email *</label>
                                <input type="email" class="form-control" th:field="*{email}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone *</label>
                                <input type="tel" class="form-control" th:field="*{phone}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Address</label>
                                <input type="text" class="form-control" th:field="*{address}"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">City *</label>
                                <input type="text" class="form-control" th:field="*{city}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">State</label>
                                <input type="text" class="form-control" th:field="*{state}"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Professional Info -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-success text-white fw-bold py-3">
                        <i class="fas fa-briefcase me-2"></i>Professional Information
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Category *</label>
                                <select class="form-select" th:field="*{categoryId}" required>
                                    <option value="">-- Select Category --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Profession *</label>
                                <input type="text" class="form-control" th:field="*{profession}" placeholder="e.g. Plumber" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Specialization</label>
                                <input type="text" class="form-control" th:field="*{specialization}"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Experience (Years) *</label>
                                <input type="number" class="form-control" th:field="*{experienceYears}" min="0" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Skills (comma separated)</label>
                                <input type="text" class="form-control" th:field="*{skills}" placeholder="Pipe repair, Drainage, Water heater installation"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Brief description about yourself and your services..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Service Area</label>
                                <input type="text" class="form-control" th:field="*{serviceArea}" placeholder="e.g. South Mumbai, Andheri"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pricing -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-warning text-dark fw-bold py-3">
                        <i class="fas fa-rupee-sign me-2"></i>Pricing (₹)
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Hourly Rate</label>
                                <div class="input-group"><span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" th:field="*{hourlyRate}" min="0" placeholder="0.00"/>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Daily Rate</label>
                                <div class="input-group"><span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" th:field="*{dailyRate}" min="0" placeholder="0.00"/>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Fixed Rate</label>
                                <div class="input-group"><span class="input-group-text">₹</span>
                                    <input type="number" class="form-control" th:field="*{fixedRate}" min="0" placeholder="0.00"/>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Availability -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-info text-white fw-bold py-3">
                        <i class="fas fa-clock me-2"></i>Availability
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Working Days</label>
                                <input type="text" class="form-control" th:field="*{workingDays}" placeholder="Mon-Sat"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Working Hours</label>
                                <input type="text" class="form-control" th:field="*{workingHours}" placeholder="9:00 AM - 6:00 PM"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Account Security -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-secondary text-white fw-bold py-3">
                        <i class="fas fa-lock me-2"></i>Account Password
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Password *</label>
                                <input type="password" class="form-control" th:field="*{password}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Confirm Password *</label>
                                <input type="password" class="form-control" th:field="*{confirmPassword}" required/>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg fw-bold py-2">
                        <i class="fas fa-paper-plane me-2"></i>Submit Registration (Pending Admin Approval)
                    </button>
                    <a th:href="@{/auth/login}" class="btn btn-outline-secondary">Already have an account? Sign In</a>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            </form>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
