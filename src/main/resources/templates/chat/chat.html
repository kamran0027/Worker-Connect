<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Book Worker | WorkerConnect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>

</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <div class="ms-auto">
            <button type="button"
                class="btn btn-outline-light btn-sm"
                onclick="history.back()">
                ← Back
            </button>
        </div> 
    </div>
</nav>

<div class="container py-3">
    <div class="chat-container shadow">

        <div class="chat-header">
            <i class="fas fa-user-hard-hat me-2"></i>
            WorkerConnect Chat
        </div>

        <div id="chatBox" class="chat-body">

        </div>

        <div class="chat-footer">

            <input
                    id="message"
                    class="form-control"
                    placeholder="Type a message...">

            <button class="btn btn-primary ms-2"
                    onclick="sendMessage()">
                    send
            </button>

        </div>

    </div>
</div>

<script th:inline="javascript">
    const bookingId = [[${bookingId}]];
    const currentUserId = [[${currentUserId}]];
    const receiverId = [[${receiverId}]];
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>

    let socket=new SockJS('/ws');

    let stompClient=Stomp.over(socket);

    stompClient.connect({},function(){

        loadMessages();

        stompClient.subscribe(
            "/topic/chat/"+bookingId,

            function(response){

                show(JSON.parse(response.body));

            }

        );

    });
    
    // send

    function sendMessage(){

        let input=document.getElementById("message");

        let msg=input.value.trim();
        if(msg==="") return;

        stompClient.send(

            "/app/sendMessage",

            {},

            JSON.stringify({

                bookingId:bookingId,

                receiverId:receiverId,

                message:msg

            })

        );
        input.value = "";
        input.focus();

    }

    // receive
    function show(message){

        let box=document.getElementById("chatBox");

         const type =
        message.senderId == currentUserId
            ? "sent"
            : "received";

        box.innerHTML+=`

            <div class="message ${type}">

                <div class="bubble">

                    <div class="sender">
                        ${message.senderName}
                    </div>

                    <div class="text">
                        ${message.message}
                    </div>

                

                    <div class="time">
                        ${message.sentTime}
                    </div>

            </div>

        </div>

        `;
        box.scrollTop = box.scrollHeight;

    }


    async function loadMessages() {

        const response = await fetch("/chat/messages/"+ bookingId);
        const messages = await response.json();

        document.getElementById("chatBox").innerHTML="";
        messages.forEach(show);
        document.getElementById("chatBox").scrollTop = document.getElementById("chatBox").scrollHeight;
    }
</script>
</body>
</html>
