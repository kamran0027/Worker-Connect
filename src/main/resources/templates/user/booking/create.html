<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Book Worker | WorkerConnect</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container"><a class="navbar-brand fw-bold" th:href="@{/}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect</a>
        <div class="ms-auto"><a th:href="@{/user/dashboard}" class="btn btn-outline-light btn-sm">Dashboard</a></div>
    </div>
</nav>
<div class="container py-4">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="row g-4">
        <!-- Worker Summary -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm sticky-top" style="top:20px">
                <div class="card-body p-4 text-center">
                    <img th:src="${worker.profileImage != null ? worker.profileImage : '/images/default-worker.png'}"
                         class="rounded-circle avatar mb-3" width="90" height="90" alt="Worker"/>
                    <h5 class="fw-bold" th:text="${worker.fullName}"></h5>
                    <p class="text-primary" th:text="${worker.profession}"></p>
                    <div class="star-rating mb-2">
                        <i class="fas fa-star"></i>
                        <strong th:text="${#numbers.formatDecimal(worker.averageRating,1,1)}"></strong>
                        <small class="text-muted">(<span th:text="${worker.totalReviews}"></span> reviews)</small>
                    </div>
                    <hr/>
                    <div class="text-start">
                        <div th:if="${worker.hourlyRate != null}" class="d-flex justify-content-between mb-1">
                            <span class="text-muted small">Hourly</span><strong>₹<span th:text="${worker.hourlyRate}"></span></strong>
                        </div>
                        <div th:if="${worker.dailyRate != null}" class="d-flex justify-content-between mb-1">
                            <span class="text-muted small">Daily</span><strong>₹<span th:text="${worker.dailyRate}"></span></strong>
                        </div>
                        <div th:if="${worker.fixedRate != null}" class="d-flex justify-content-between">
                            <span class="text-muted small">Fixed</span><strong>₹<span th:text="${worker.fixedRate}"></span></strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Booking Form -->
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-calendar-plus me-2"></i>Create Booking</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/user/book}" method="post" th:object="${bookingDto}">
                        <input type="hidden" th:field="*{workerId}"/>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Booking Date *</label>
                                <input type="date" class="form-control" th:field="*{bookingDate}"
                                       th:min="${#dates.format(#dates.createNow(),'yyyy-MM-dd')}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Preferred Time *</label>
                                <input type="time" class="form-control" th:field="*{bookingTime}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Work Start Date *</label>
                                <input type="date" class="form-control" th:field="*{startDate}" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Expected Completion Date *</label>
                                <input type="date" class="form-control" th:field="*{completionDate}" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Service Type *</label>
                                <select class="form-select" th:field="*{serviceType}" required>
                                    <option value="">-- Select Type --</option>
                                    <option value="HOURLY">Hourly</option>
                                    <option value="DAILY">Daily</option>
                                    <option value="FIXED">Fixed Price</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Agreed Amount (₹) *</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" step="0.01" min="1" class="form-control" th:field="*{amount}" required/>
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Work Description *</label>
                                <textarea class="form-control" th:field="*{workDescription}" rows="4"
                                          placeholder="Describe the work you need done in detail..." required></textarea>
                            </div>
                        </div>
                        <div class="alert alert-info mt-3 small">
                            <i class="fas fa-info-circle me-1"></i>
                            After booking, a service agreement will be generated. Both you and the worker must digitally sign it before work begins.
                        </div>
                        <div class="d-flex gap-2 mt-3">
                            <button type="submit" class="btn btn-primary px-5 fw-bold py-2">
                                <i class="fas fa-check me-2"></i>Confirm Booking
                            </button>
                            <a th:href="@{/workers/{id}(id=${worker.id})}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
