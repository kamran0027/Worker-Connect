<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Payment | WorkerConnect</title>
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container"><a class="navbar-brand fw-bold" th:href="@{/}"><i class="fas fa-hard-hat me-2"></i>WorkerConnect</a>
        <div class="ms-auto"><a th:href="@{/user/bookings}" class="btn btn-outline-light btn-sm">My Bookings</a></div>
    </div>
</nav>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-credit-card me-2"></i>Complete Payment</h5>
                </div>
                <div class="card-body p-4">
                    <table class="table table-borderless mb-4">
                        <tr><td class="text-muted">Booking</td><td class="fw-semibold" th:text="${booking.bookingNumber}"></td></tr>
                        <tr><td class="text-muted">Worker</td><td th:text="${booking.worker.fullName}"></td></tr>
                        <tr><td class="text-muted">Service</td><td th:text="${booking.serviceType}"></td></tr>
                        <tr><td class="text-muted fw-bold">Total Amount</td><td class="fw-bold text-success fs-5">₹<span th:text="${booking.amount}" id="amount"></span></td></tr>
                    </table>
                    <hr/>
                    <h6 class="fw-bold mb-3">Choose Payment Method</h6>
                    <div class="d-grid gap-3">
                        <!-- Razorpay -->
                        <button onclick="payRazorpay()" class="btn btn-warning btn-lg fw-bold">
                            <i class="fas fa-rupee-sign me-2"></i>Pay Online
                        </button>
                        <!-- Stripe -->
                        <a th:href="@{/user/payment/COD/checkout(bookingId=${booking.id})}" class="btn btn-dark btn-lg fw-bold">
                            <i class="fab fa-stripe-s me-2"></i>Pay via Cash
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
const bookingId   = [[${booking.id}]];
const amount      = [[${booking.amount}]];
const razorpayKey = [[${razorpayKeyId}]];

async function payRazorpay() {
    const csrfToken = document.querySelector('meta[name=_csrf]')?.content || '';
    const csrfHeader = document.querySelector('meta[name=_csrf_header]')?.content || 'X-CSRF-TOKEN';
    const resp = await fetch('/user/payment/razorpay/create', {
        method: 'POST',
        headers: (function(){ const h = {}; h['Content-Type']='application/x-www-form-urlencoded'; h[csrfHeader]=csrfToken; return h; })(),
        body: 'bookingId=' + bookingId
    });
    const data = await resp.json();
    if (data.error) { alert('Error: ' + data.error); return; }

    const options = {
        key: razorpayKey,
        amount: Math.round(amount * 100),
        currency: 'INR',
        name: 'WorkerConnect',
        description: 'Service Payment',
        order_id: data.orderId,
        handler: async function(response) {
            try {
                const csrfToken = document.querySelector('meta[name=_csrf]')?.content || '';
                const csrfHeader = document.querySelector('meta[name=_csrf_header]')?.content || 'X-CSRF-TOKEN';
                const body = 'razorpay_order_id=' + encodeURIComponent(response.razorpay_order_id)
                           + '&razorpay_payment_id=' + encodeURIComponent(response.razorpay_payment_id)
                           + '&razorpay_signature=' + encodeURIComponent(response.razorpay_signature);

                const verifyResp = await fetch('/user/payment/razorpay/verify', {
                    method: 'POST',
                    headers: (function(){ const h = {}; h['Content-Type']='application/x-www-form-urlencoded'; h['Accept']='application/json'; h[csrfHeader]=csrfToken; return h; })(),
                    body: body
                });

                if (verifyResp.ok) {
                    // redirect to booking details
                    window.location = '/user/bookings/' + bookingId;
                } else {
                    const text = await verifyResp.text();
                    alert('Payment verification failed: ' + text);
                }
            } catch (err) {
                alert('Verification error: ' + err.message);
            }
        },
        theme: { color: '#2563eb' }
    };
    new Razorpay(options).open();
}
</script>
</body>
</html>
